{% set name = "diode" %}
{% set version = "1.2.1" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/diode-{{ version }}.tar.gz
  sha256: 9299e2c6e99c02c5c1e3bd442669f8333bfcc58c7fffe457eb35a3e6444e0913

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  skip: true  # [win or py<312]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
    - cmake
    - make
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - numpy >=2                              # [build_platform != target_platform]
  host:
    - pip
    - python
    - cgal-cpp
    - python
    - scikit-build-core
    - pybind11
    - gmp
    - mpfr
    - numpy >=2.3.5
  run:
    - python


test:
  imports:
    - diode
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/mrzv/diode
  summary: alpha shape generator using CGAL
  license: GPL-2.0-or-later
  license_file:
    - LICENSE
    - vendor-licenses/

extra:
  recipe-maintainers:
    - mrzv
    - kjappelbaum
